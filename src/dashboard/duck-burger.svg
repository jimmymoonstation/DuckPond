<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- ── Top bun ── -->
  <ellipse cx="100" cy="62" rx="52" ry="30" fill="#c8722a"/>
  <ellipse cx="100" cy="54" rx="52" ry="24" fill="#e8924a"/>
  <!-- sesame seeds -->
  <ellipse cx="82"  cy="48" rx="5" ry="3" fill="#f5c87a" transform="rotate(-20,82,48)"/>
  <ellipse cx="100" cy="44" rx="5" ry="3" fill="#f5c87a" transform="rotate(5,100,44)"/>
  <ellipse cx="118" cy="48" rx="5" ry="3" fill="#f5c87a" transform="rotate(15,118,48)"/>
  <ellipse cx="90"  cy="56" rx="4" ry="2.5" fill="#f5c87a" transform="rotate(-10,90,56)"/>
  <ellipse cx="110" cy="55" rx="4" ry="2.5" fill="#f5c87a" transform="rotate(10,110,55)"/>

  <!-- ── Duck head / face (yellow) peeking above bun ── -->
  <ellipse cx="100" cy="38" rx="28" ry="26" fill="#f5d020"/>
  <!-- duck eyes -->
  <circle cx="88"  cy="32" r="5" fill="white"/>
  <circle cx="112" cy="32" r="5" fill="white"/>
  <circle cx="89"  cy="32" r="3" fill="#1a1a2e"/>
  <circle cx="113" cy="32" r="3" fill="#1a1a2e"/>
  <!-- eye shine -->
  <circle cx="90"  cy="31" r="1.2" fill="white"/>
  <circle cx="114" cy="31" r="1.2" fill="white"/>
  <!-- duck bill -->
  <ellipse cx="100" cy="44" rx="11" ry="6" fill="#f0a020"/>
  <line x1="89" y1="44" x2="111" y2="44" stroke="#d08010" stroke-width="1.2"/>
  <!-- little quiff / tuft on head -->
  <path d="M97 14 Q100 6 103 14" stroke="#e8b010" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ── Burger body stack ── -->
  <!-- Cheese slice -->
  <rect x="46" y="80" width="108" height="14" rx="3" fill="#f7c948"/>
  <polygon points="46,80 46,94 40,94" fill="#e8b030"/>
  <polygon points="154,80 154,94 160,94" fill="#e8b030"/>

  <!-- Lettuce -->
  <path d="M44 92 Q55 84 66 92 Q77 100 88 92 Q99 84 110 92 Q121 100 132 92 Q143 84 154 92 Q158 98 154 104 Q110 98 46 104 Q44 98 44 92Z" fill="#4caf50"/>
  <path d="M44 92 Q55 88 66 92 Q77 96 88 92 Q99 88 110 92 Q121 96 132 92 Q143 88 154 92" stroke="#388e3c" stroke-width="1" fill="none"/>

  <!-- Tomato -->
  <rect x="50" y="102" width="100" height="12" rx="3" fill="#e53935"/>
  <line x1="75"  y1="102" x2="75"  y2="114" stroke="#c62828" stroke-width="1"/>
  <line x1="100" y1="102" x2="100" y2="114" stroke="#c62828" stroke-width="1"/>
  <line x1="125" y1="102" x2="125" y2="114" stroke="#c62828" stroke-width="1"/>

  <!-- Patty -->
  <rect x="46" y="112" width="108" height="18" rx="5" fill="#5d3a1a"/>
  <rect x="46" y="112" width="108" height="5"  rx="5" fill="#7a4a22"/>

  <!-- Bottom bun -->
  <ellipse cx="100" cy="138" rx="54" ry="10" fill="#c8722a"/>
  <ellipse cx="100" cy="132" rx="54" ry="14" fill="#e8924a"/>

  <!-- ── Duck wings (little flaps on sides) ── -->
  <ellipse cx="52"  cy="108" rx="14" ry="9" fill="#f5d020" transform="rotate(-30,52,108)"/>
  <ellipse cx="148" cy="108" rx="14" ry="9" fill="#f5d020" transform="rotate(30,148,108)"/>

  <!-- ── Duck feet ── -->
  <!-- left foot -->
  <ellipse cx="80" cy="162" rx="18" ry="8" fill="#f0a020" transform="rotate(-10,80,162)"/>
  <line x1="66" y1="164" x2="60" y2="170" stroke="#f0a020" stroke-width="5" stroke-linecap="round"/>
  <line x1="72" y1="167" x2="68" y2="174" stroke="#f0a020" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="80" cy="148" rx="6" ry="14" fill="#f0a020"/>
  <!-- right foot -->
  <ellipse cx="120" cy="162" rx="18" ry="8" fill="#f0a020" transform="rotate(10,120,162)"/>
  <line x1="134" y1="164" x2="140" y2="170" stroke="#f0a020" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="167" x2="132" y2="174" stroke="#f0a020" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="120" cy="148" rx="6" ry="14" fill="#f0a020"/>
</svg>
